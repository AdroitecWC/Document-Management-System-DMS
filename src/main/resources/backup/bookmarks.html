<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookmarks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div th:replace="~{common/nav :: nav-bar}"></div>
<br><br><br>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h2 class="text-center">My Bookmarks</h2>
        </div>

        <div class="card-body">
            <div id="bookmarksList">
                <p class="text-center">Loading bookmarks...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Fetch and display bookmarks
    fetch('/bookmarks')
        .then(response => response.json())
        .then(bookmarks => {
            const container = document.getElementById('bookmarksList');

            if (bookmarks.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">No bookmarks yet</p>';
                return;
            }

            let html = '<div class="list-group">';
            bookmarks.forEach(bookmark => {
                const date = new Date(bookmark.createdAt).toLocaleString();
                html += `
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-1">
                                <i class="fas fa-bookmark text-warning"></i>
                                <a href="/DocViewer?id=${bookmark.documentId}&page=${bookmark.pageNumber}"
                                   class="text-decoration-none">${bookmark.documentTitle}</a>
                            </h5>
                            <p class="mb-1">
                                <strong>${bookmark.bookmarkName}</strong>
                                ${bookmark.pageNumber ? `- Page ${bookmark.pageNumber}` : ""}
                            </p>
                            <small>${date}</small>
                        </div>
                        <button class="btn btn-sm btn-danger" onclick="deleteBookmark(${bookmark.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                `;
            });
            html += '</div>';

            container.innerHTML = html;
        })
        .catch(error => {
            console.error('Error loading bookmarks:', error);
            document.getElementById('bookmarksList').innerHTML =
                '<p class="text-center text-danger">Failed to load bookmarks</p>';
        });

    // Delete bookmark function
    function deleteBookmark(bookmarkId) {
        if (!confirm("Are you sure you want to delete this bookmark?")) return;

        fetch(`/bookmarks/${bookmarkId}`, {
            method: 'DELETE'
        })
        .then(response => {
            if (response.ok) {
                // Remove from DOM immediately
                const item = document.querySelector(`button[onclick="deleteBookmark(${bookmarkId})"]`).closest('.list-group-item');
                if (item) item.remove();
                alert("✅ Bookmark deleted successfully!");
            } else {
                return response.text().then(text => { throw new Error(text); });
            }
        })
        .catch(error => {
            console.error('Error deleting bookmark:', error);
            alert("❌ Failed to delete bookmark.");
        });
    }
</script>

</body>
</html>
