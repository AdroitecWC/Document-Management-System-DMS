<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
</head>
<body>
<!-- Top Navbar Fragment -->
<nav th:fragment="navbar" class="navbar navbar-dark fixed-top" style="background-color: #1e3a5f; height: 70px; z-index: 1050; overflow: visible;">
    <!--
        ✅ KEY FIX: This inline script runs BEFORE the browser paints anything.
        It applies the collapsed class immediately so there is zero visual flash
        when navigating between pages. No DOMContentLoaded needed here.
    -->
    <script>
        (function() {
            if (localStorage.getItem('sidebarState') === 'collapsed') {
                document.documentElement.setAttribute('data-sidebar', 'collapsed');
            }
        })();
    </script>
    <style>
        .notification-bell { position: relative; cursor: pointer; }
        .notification-badge {
            position: absolute; top: -4px; right: -4px;
            background: #ef4444; color: white; font-size: 10px; font-weight: 700;
            min-width: 18px; height: 18px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 4px; border: 2px solid #1e3a5f;
        }
        .notification-badge.hidden { display: none; }
        .notification-panel {
            display: none; position: absolute; top: 100%; right: 0;
            width: 380px; max-height: 480px; background: white;
            border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.25);
            z-index: 9999; overflow: hidden; margin-top: 8px;
        }
        .notification-panel.show { display: flex; flex-direction: column; }
        .notification-panel-header {
            padding: 16px 20px; background: #f8fafc;
            border-bottom: 1px solid #e5e7eb;
            display: flex; justify-content: space-between; align-items: center;
        }
        .notification-panel-header h6 { margin: 0; font-size: 15px; font-weight: 700; color: #1e3a5f; }
        .notification-mark-read {
            font-size: 12px; color: #667eea; cursor: pointer;
            font-weight: 600; border: none; background: none; padding: 4px 8px; border-radius: 4px;
        }
        .notification-mark-read:hover { background: #eef2ff; }
        .notification-list {
            overflow-y: auto; max-height: 380px; flex: 1;
        }
        .notification-list::-webkit-scrollbar { width: 5px; }
        .notification-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .notification-item {
            display: flex; gap: 12px; padding: 14px 20px;
            border-bottom: 1px solid #f3f4f6; transition: background 0.2s; cursor: default;
        }
        .notification-item:hover { background: #f9fafb; }
        .notification-item.unread { background: #eff6ff; }
        .notification-item.unread:hover { background: #dbeafe; }
        .notification-icon-circle {
            width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 15px;
        }
        .notification-icon-circle.success { background: #d1fae5; color: #059669; }
        .notification-icon-circle.danger { background: #fee2e2; color: #dc2626; }
        .notification-icon-circle.info { background: #dbeafe; color: #2563eb; }
        .notification-icon-circle.warning { background: #fef3c7; color: #d97706; }
        .notification-content { flex: 1; min-width: 0; }
        .notification-text { font-size: 13px; color: #374151; line-height: 1.4; margin: 0; }
        .notification-text strong { color: #1e3a5f; }
        .notification-time { font-size: 11px; color: #9ca3af; margin-top: 3px; }
        .notification-empty {
            padding: 40px 20px; text-align: center; color: #9ca3af;
        }
        .notification-empty i { font-size: 36px; margin-bottom: 10px; display: block; color: #d1d5db; }
    </style>

    <div class="container-fluid d-flex align-items-center">
        <!-- Left side: Toggle + Logo -->
        <div class="d-flex align-items-center">
            <button class="btn btn-outline-light me-2" id="toggleBtn" title="Toggle Sidebar">
                <i class="bi bi-list"></i>
            </button>
            <a th:href="@{/documents}">
                <img src="/images/adroitec-logo.png"
                     alt="Adroitec Company Logo"
                     class="me-3"
                     style="height: 60px; width: auto; cursor: pointer;">
            </a>
        </div>

        <!-- Center: Title -->
        <span class="navbar-brand mb-0 h1 mx-auto" style="font-size:25px;">
            <img src="/images/DMS_logo_fill.png"
                 style="width: 35px; height: 35px; object-fit: contain; margin-right: 0px;"
                 alt="Document Library Icon"> Document Management System
        </span>

        <!-- Right side: Notifications + Profile dropdown -->
        <div class="d-flex align-items-center gap-2">
            <!-- Notification Bell -->
            <div class="notification-bell" id="notificationBell" onclick="toggleNotificationPanel(event)" style="position:relative;">
                <button class="btn btn-outline-light" style="border:none;font-size:20px;padding:6px 10px;" title="Notifications">
                    <i class="bi bi-bell"></i>
                </button>
                <span class="notification-badge hidden" id="notifBadge">0</span>
                <div class="notification-panel" id="notifPanel">
                    <div class="notification-panel-header">
                        <h6><i class="bi bi-bell me-2"></i>Notifications</h6>
                        <button class="notification-mark-read" onclick="markAllNotificationsRead(event)">Mark all read</button>
                    </div>
                    <div class="notification-list" id="notifList">
                        <div class="notification-empty">
                            <i class="bi bi-bell-slash"></i>
                            <p>No notifications today</p>
                        </div>
                    </div>
                </div>
            </div>



        <!-- Right side: Profile dropdown -->
        <div class="dropdown">
            <button class="btn btn-outline-light d-flex align-items-center" type="button"
                    id="profileDropdown" data-bs-toggle="dropdown">
                <div class="rounded-circle bg-light text-dark d-flex align-items-center justify-content-center me-2"
                     style="width: 35px; height: 35px; font-weight: bold;">
                    <span th:text="${#strings.substring(#authentication.name, 0, 2).toUpperCase()}">DM</span>
                </div>
                <div class="text-start">
                    <div style="font-size: 0.9rem;" sec:authentication="name"></div>
                    <div style="font-size: 0.75rem; opacity: 0.8;">
                        <span th:each="authority : ${#authentication.principal.authorities}"
                              th:if="${authority.authority.startsWith('ROLE_')}"
                              th:text="${#strings.replace(authority.authority, 'ROLE_', '')}">
                        </span>
                    </div>
                </div>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person-fill me-2"></i>Profile</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
            </ul>
        </div>
    </div>
        </div>
</nav>

<!-- JavaScript for Sidebar Toggle -->
<script th:fragment="navbar-js">
    // ✅ Apply sidebar state instantly (before DOMContentLoaded) to prevent flash
    (function() {
        const state = localStorage.getItem('sidebarState');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.querySelector('.main-content');
        if (state === 'collapsed' && sidebar) {
            sidebar.classList.add('collapsed');
            if (mainContent) mainContent.classList.add('expanded');
        }
    })();

    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('toggleBtn');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.querySelector('.main-content');

        // ✅ Disable transitions temporarily on load so the initial state
        //    snaps in immediately with no sliding animation
        if (sidebar) {
            sidebar.style.transition = 'none';
            if (mainContent) mainContent.style.transition = 'none';

            // Re-enable transitions after first paint
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    sidebar.style.transition = '';
                    if (mainContent) mainContent.style.transition = '';
                });
            });
        }

        // Toggle sidebar on button click
        toggleBtn?.addEventListener('click', function() {
            if (sidebar) {
                const isCollapsed = sidebar.classList.contains('collapsed');

                if (isCollapsed) {
                    // OPEN the sidebar
                    sidebar.classList.remove('collapsed');
                    mainContent?.classList.remove('expanded');
                    document.documentElement.removeAttribute('data-sidebar');
                    localStorage.setItem('sidebarState', 'expanded');
                } else {
                    // CLOSE the sidebar
                    sidebar.classList.add('collapsed');
                    mainContent?.classList.add('expanded');
                    document.documentElement.setAttribute('data-sidebar', 'collapsed');
                    localStorage.setItem('sidebarState', 'collapsed');
                }
            }
        });

        // ✅ Set active link based on current URL path
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('#sidebar .nav-link');
        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href && (href === currentPath || currentPath.startsWith(href + '/'))) {
                link.classList.add('active');
            }
        });
   });

    // ==================== NOTIFICATION BELL ====================
    const NOTIF_READ_KEY = 'notif_read_ids_' + new Date().toISOString().slice(0, 10);
    let notifData = [];

    function getReadIds() {
        try { return JSON.parse(sessionStorage.getItem(NOTIF_READ_KEY) || '[]'); } catch(e) { return []; }
    }

    function saveReadIds(ids) {
        sessionStorage.setItem(NOTIF_READ_KEY, JSON.stringify(ids));
    }

    function fetchNotifications() {
        fetch('/api/notifications/recent')
            .then(r => r.ok ? r.json() : [])
            .then(data => {
                notifData = data || [];
                renderNotifications();
            })
            .catch(() => {});
    }

    function renderNotifications() {
        const list = document.getElementById('notifList');
        const badge = document.getElementById('notifBadge');
        if (!list || !badge) return;

        const readIds = getReadIds();
        const unreadCount = notifData.filter(n => !readIds.includes(n.logId)).length;

        if (unreadCount > 0) {
            badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }

        if (notifData.length === 0) {
            list.innerHTML = '<div class="notification-empty"><i class="bi bi-bell-slash"></i><p>No notifications today</p></div>';
            return;
        }

        list.innerHTML = notifData.slice(0, 50).map(n => {
            const isUnread = !readIds.includes(n.logId);
            const meta = getActionMeta(n.action);
            const timeAgo = formatTimeAgo(n.timestamp);
            return `<div class="notification-item ${isUnread ? 'unread' : ''}">
                <div class="notification-icon-circle ${meta.color}"><i class="bi ${meta.icon}"></i></div>
                <div class="notification-content">
                    <p class="notification-text"><strong>${meta.label}</strong> — ${escapeHtmlNotif(n.details || '')}</p>
                    <div class="notification-time"><i class="bi bi-clock me-1"></i>${timeAgo}</div>
                </div>
            </div>`;
        }).join('');
    }

    function getActionMeta(action) {
        if (!action) return { icon: 'bi-info-circle', color: 'info', label: 'Activity' };
        const a = action.toUpperCase();
        if (a.includes('FAILED') || a.includes('FAIL')) return { icon: 'bi-x-circle', color: 'danger', label: formatAction(action) };
        if (a.includes('DELETE') || a.includes('BULK'))  return { icon: 'bi-trash', color: 'warning', label: formatAction(action) };
        if (a.includes('LOGIN'))                          return { icon: 'bi-box-arrow-in-right', color: 'info', label: 'Login' };
        if (a.includes('LOGOUT'))                         return { icon: 'bi-box-arrow-right', color: 'info', label: 'Logout' };
        if (a.includes('UPLOAD'))                         return { icon: 'bi-cloud-arrow-up', color: 'success', label: 'Upload' };
        if (a.includes('DOWNLOAD'))                       return { icon: 'bi-download', color: 'info', label: 'Download' };
        if (a.includes('EDIT') || a.includes('UPDATE'))   return { icon: 'bi-pencil', color: 'info', label: formatAction(action) };
        if (a.includes('CREATE') || a.includes('ADD'))    return { icon: 'bi-plus-circle', color: 'success', label: formatAction(action) };
        if (a.includes('SETTINGS'))                       return { icon: 'bi-gear', color: 'info', label: 'Settings' };
        return { icon: 'bi-activity', color: 'info', label: formatAction(action) };
    }

    function formatAction(action) {
        return action.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()).replace(/\bFailed\b/i, 'Failed');
    }

    function formatTimeAgo(timestamp) {
        const diff = Math.floor((Date.now() - new Date(timestamp).getTime()) / 1000);
        if (diff < 60) return 'Just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return Math.floor(diff / 86400) + 'd ago';
    }

    function escapeHtmlNotif(s) {
        const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
    }

    function toggleNotificationPanel(e) {
        e.stopPropagation();
        const panel = document.getElementById('notifPanel');
        panel.classList.toggle('show');
    }

    function markAllNotificationsRead(e) {
        e.stopPropagation();
        const allIds = notifData.map(n => n.logId);
        saveReadIds(allIds);
        renderNotifications();
    }

    // Close panel when clicking outside
    document.addEventListener('click', function(e) {
        const panel = document.getElementById('notifPanel');
        const bell = document.getElementById('notificationBell');
        if (panel && bell && !bell.contains(e.target)) {
            panel.classList.remove('show');
        }
    });

    // Fetch on load + refresh every 30 seconds
    fetchNotifications();
    setInterval(fetchNotifications, 30000);
</script>z
</body>
</html>
